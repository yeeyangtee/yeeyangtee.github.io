about_content: | # this will include new lines to allow paragraphs
  Hi, I'm Yee Yang — an engineer, tinkerer, and lifelong learner who loves to build products, tools,
  and explore new technologies. I am currently an AI Engineer at Balyasny Asset Management, working at
  the intersection of machine learning and quantitative finance.

  My goal in life is to learn as much as I can, solve challenging problems, and achieve things that are
  meaningful, engaging, and valuable. I hold a PhD in Electrical and Electronic Engineering
  (Deep Learning, Computer Vision) from NTU Singapore.

  I am most skilled in <mark>PyTorch</mark>, <mark>Deep Learning</mark>, and <mark>Large Language Models</mark>.

